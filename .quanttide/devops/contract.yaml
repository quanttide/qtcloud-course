# qtcloud-course DevOps 契约
name: qtcloud-course
description: "量潮课程云 - AI原生课程研发与授课中心"

stages:
  build:
    command: "true"
  test:
    command: "true"
  release:
    changelog: CHANGELOG.md
    pre_publish:
      - command: "dart analyze"
        dir: src/studio
      - command: "go vet ./..."
        dir: src/provider
      - command: "cargo check"
        dir: src/cli

platform:
  source_control: Github
  pipeline: GithubActions

scopes:
  - name: root
    dir: .
    language: python
    build_tool: uv
  - name: studio
    dir: src/studio
    language: dart
    build_tool: flutter
  - name: provider
    dir: src/provider
    language: go
    build_tool: go
  - name: cli
    dir: src/cli
    language: rust
    build_tool: cargo
