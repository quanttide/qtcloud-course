<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>课堂</title>
  <style>
    body { display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0;
           background: #1a1a1a; color: #ccc; font-family: sans-serif; }
    video { max-width: 90vw; max-height: 70vh; border-radius: 8px; }
    .info { margin-top: 1em; font-size: 14px; }
    .ok { color: #4caf50; }
    .fail { color: #f44336; }
  </style>
</head>
<body>
  <video id="player" controls autoplay muted>
    <source id="source" src="" type="video/mp4">
  </video>
  <div class="info">
    <div id="status">加载中...</div>
    <div id="size"></div>
  </div>
  <script>
    const v = document.getElementById('player');
    const source = document.getElementById('source');
    const status = document.getElementById('status');
    const size = document.getElementById('size');

    // 从查询参数获取视频 URL，例如 ?url=http://localhost:9092/video/intro.mp4
    // 未传参时使用默认地址（方便手动使用）
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('url') || 'http://localhost:9092/video/quickstart/intro.mp4';
    source.src = videoUrl;

    // 重新加载视频（上面修改 src 后需要）
    v.load();

    v.oncanplay = () => {
      status.innerHTML = '<span class="ok">✓ 视频可播放</span>';
      size.textContent = `分辨率: ${v.videoWidth}×${v.videoHeight}`;
    };
    v.onerror = () => {
      status.innerHTML = '<span class="fail">✗ 视频无法播放</span>';
    };
  </script>
</body>
</html>
